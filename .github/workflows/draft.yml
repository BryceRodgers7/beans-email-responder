name: Draft inquiry replies

on:
  schedule:
    # A few times per day (UTC). GitHub cron is best-effort and may lag; the
    # label-based design means a delayed run just processes the backlog next time.
    - cron: "0 13,17,21 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

concurrency:
  group: email-drafter    # never let two runs overlap
  cancel-in-progress: false

permissions:
  contents: write   # allow committing the permanent error log back to the repo

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drafter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python -m app.run

      - name: Persist process log
        if: always()   # commit the log even if the drafter step failed
        run: |
          if [[ -n "$(git status --porcelain logs/process_log.tsv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add logs/process_log.tsv
            git commit -m "chore(logs): record drafter run [skip ci]"
            git push
          else
            echo "No new process-log entries to commit."
          fi
