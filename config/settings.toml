# Non-secret, version-controlled tunables. Secrets live in env vars / .env.

[openai]
model = "gpt-4o-mini"
temperature = 0.4
max_retries = 1

[gmail]
label_new    = "Website Inquiries/New"
label_done   = "Website Inquiries/AI Draft Created"
label_error  = "Website Inquiries/Error"
label_drafts = "Website Inquiries/AI Assisted Drafts"
# Safety cap on how many inquiries to process per run.
max_batch = 25

[draft]
# Drafts get this subject. No prefix — AI drafts are identified by the
# `AI Assisted Drafts` label (set subject_prefix to a value to re-enable one).
subject_prefix = ""
subject = "Re: your inquiry"
